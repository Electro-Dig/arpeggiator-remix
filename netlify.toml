[build]
  publish = "."

[[edge_functions]]
  path = "/*"
  function = "invite-gate"

[[redirects]]
  from = "/recordings-api/*"
  to = "/.netlify/functions/recordings-api"
  status = 200
  force = true

[[redirects]]
  from = "/r/audio/*"
  to = "/.netlify/functions/recordings-api"
  status = 200
  force = true

[[redirects]]
  from = "/r/poster/*"
  to = "/.netlify/functions/recordings-api"
  status = 200
  force = true

[[redirects]]
  from = "/r/*"
  to = "/r/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "no-referrer"
