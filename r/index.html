<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <meta name="referrer" content="no-referrer">
  <title>你的现场录音 · Arpeggiator Remix</title>
  <link rel="stylesheet" href="/r/share.css">
</head>
<body>
  <main class="share-shell">
    <article class="recording-card" aria-labelledby="share-title">
      <header class="recording-card__header">
        <span class="signal" aria-hidden="true"></span>
        <p>WAIC 双手乐队 / LIVE TAKE</p>
        <span>24H</span>
      </header>

      <section class="recording-card__body">
        <p class="eyebrow">GESTURE-GENERATED AUDIO</p>
        <p id="share-take-label" class="take-label">LIVE TAKE</p>
        <h1 id="share-title">你的现场录音</h1>
        <p id="share-checkin" class="share-checkin"></p>
        <p id="share-status" class="share-status" role="status" aria-live="polite">正在读取录音…</p>
        <figure id="share-poster-frame" class="share-poster-frame" hidden>
          <img id="share-poster" class="share-poster" alt="你的 WAIC 双手乐队现场单曲海报">
          <figcaption>你的现场单曲封面 · 长按也可保存</figcaption>
        </figure>
        <audio id="shared-recording" controls preload="metadata" hidden></audio>
        <div class="download-actions">
          <a id="download-recording" class="download-action" href="#" hidden>下载录音 <span>↓</span></a>
          <button id="download-poster" class="download-action" type="button" hidden>下载分享海报 <span>↓</span></button>
        </div>
      </section>

      <footer class="recording-card__footer">
        <p id="recording-expiry">录音将在上传后 24 小时内自动失效</p>
        <a href="https://arpeggiator-remix-2.netlify.app/" rel="noreferrer">WAIC 双手乐队</a>
      </footer>
    </article>
  </main>
  <script type="module" src="/r/share-page.js"></script>
</body>
</html>
